<hr>
<h1>Todo List</h1>
<input type="text" [value]="title()" (input)="title.set($event.target.value)" placeholder="Enter The Tasks">
<button class="add-button" (click)="addTask()">Add Task</button>
<ul>
@for(task of tasks(); track task.id){
  <li class="task-list"><span>{{$index+1}}</span><span>{{task.title}}</span><span>
    
    <button  (click)="deleteTask(task.id)" class="delete-button">Delete</button></span></li>
}
@empty{
  <span class="noTask">No Task Found</span>
}
</ul>
